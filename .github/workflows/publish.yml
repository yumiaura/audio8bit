name: Publish to PyPI

# Builds the package and uploads it to https://pypi.org when a GitHub Release
# is published (or when run manually from the Actions tab).
#
# Authentication uses PyPI Trusted Publishing (OIDC) — no API token or secret
# is stored in the repo. One-time setup on PyPI before the first release:
#   https://pypi.org/manage/account/publishing/  ->  add a pending publisher
#     PyPI Project Name: audio8bit
#     Owner:             yumiaura
#     Repository name:   audio8bit
#     Workflow name:     publish.yml
# (PyPI allows "pending" publishers, so this can be set up before the project
#  exists.) To release: bump the version in pyproject.toml and
#  audio8bit/__init__.py, then create a GitHub Release with a matching tag.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
